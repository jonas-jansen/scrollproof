<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollProof — Pythagoras's Theorem</title>
  <link rel="stylesheet" href="scrollproof.css">
  <!-- KaTeX: must be a plain script (not type=module) so it runs before our module bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>

  <!-- The SVG the engine writes into. setup() sets its viewBox. -->
  <svg id="figure"></svg>

  <!-- Prose column: populated by renderProse() from scene.steps. -->
  <div id="prose"></div>

  <!--
    type="module" is required — our compiled JS uses ES module imports.
    fetch() requires HTTP — run: python3 -m http.server 8000
    Then open: http://localhost:8000/pythagoras.html
  -->
  <script type="module">
    import { renderProse }    from './dist/prose.js';
    import { createDriver }   from './dist/driver.js';
    import { attachControls } from './dist/controls.js';

    const scene = await fetch('./pythagoras_authored.json').then(r => r.json());

    renderProse(scene, document.getElementById('prose'));
    createDriver(scene, document.getElementById('figure'));
    attachControls(scene);
  </script>

</body>
</html>
